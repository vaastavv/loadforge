apiVersion: 1

# Prometheus datasource for the LoadForge Grafana dashboards.
# The dashboard's "Data source" template variable binds to this by uid (prometheus).
# The URL uses the docker-compose service name; adjust to http://localhost:9090 for a
# standalone Prometheus, or to your in-cluster Service for Kubernetes.
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
