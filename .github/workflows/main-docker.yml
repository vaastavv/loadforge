# Main CD — build a container image for each service on every push to main
# and publish it to the GitHub Container Registry (GHCR).
# Uses the built-in GITHUB_TOKEN, so no extra registry secrets are required.
name: Main Docker Build

on:
  push:
    branches: [main]

# Least-privilege: read the source, and write packages (push images to GHCR).
permissions:
  contents: read
  packages: write

concurrency:
  group: main-docker-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: test-management-service
            image: controller
          - service: worker-service
            image: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires a lowercase image path; lowercase the owner/repo defensively.
      - name: Derive image name
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
