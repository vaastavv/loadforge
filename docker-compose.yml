# ==============================================================================
# LoadForge — full local stack
#
#   docker-compose up            # build images (first run) and start everything
#   docker-compose up --build    # force a rebuild of the service images
#   docker-compose down          # stop and remove containers
#   docker-compose down -v       # also remove the Postgres volume (wipe data)
#
# Services: zookeeper -> kafka, postgres, controller (test-management-service),
#           worker (worker-service), prometheus, grafana. All share the
#           `loadforge-net` bridge.
#
# Observability: Prometheus (http://localhost:9090) scrapes the controller and
#           worker /actuator/prometheus endpoints; Grafana (http://localhost:3000,
#           admin/admin by default) auto-provisions the Prometheus datasource and
#           the "Load Testing" dashboard folder from ./monitoring/grafana.
# ==============================================================================
name: loadforge

services:
  # ----------------------------------------------------------------------------
  # Zookeeper — coordination service required by the Kafka broker.
  # ----------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: loadforge-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - loadforge-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/2181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ----------------------------------------------------------------------------
  # Kafka — event backbone (topics: test-execution / worker-heartbeat / metrics).
  # Two listeners are advertised:
  #   * INTERNAL (kafka:29092)  — used by other containers on loadforge-net
  #   * EXTERNAL (localhost:9092) — used by tools running on the host machine
  # ----------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: loadforge-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - loadforge-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------------------------
  # PostgreSQL — persistent store for the control plane (Flyway-managed schema).
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: loadforge-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loadforge}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - loadforge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-loadforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------------------
  # Controller — test-management-service (control plane API on :8080).
  # Waits for Postgres and Kafka to be healthy before starting.
  # ----------------------------------------------------------------------------
  controller:
    build:
      context: ./services/test-management-service
      dockerfile: Dockerfile
    image: loadforge/controller:latest
    container_name: loadforge-controller
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${CONTROLLER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-loadforge}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP: test-management-service
    networks:
      - loadforge-net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Worker — worker-service (registration + heartbeat API on :8081, in-memory H2).
  # ----------------------------------------------------------------------------
  worker:
    build:
      context: ./services/worker-service
      dockerfile: Dockerfile
    image: loadforge/worker:latest
    container_name: loadforge-worker
    ports:
      - "${WORKER_PORT:-8081}:8081"
    environment:
      SERVER_PORT: 8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - loadforge-net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Prometheus — scrapes controller:8080 and worker:8081 /actuator/prometheus
  # (scrape config: ./monitoring/prometheus/prometheus.yml). UI on :9090.
  # ----------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: loadforge-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - loadforge-net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Grafana — auto-provisions the Prometheus datasource and the "Load Testing"
  # dashboard folder from ./monitoring/grafana. UI on :3000 (admin/admin).
  # ----------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: loadforge-grafana
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - loadforge-net
    restart: unless-stopped

networks:
  loadforge-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
